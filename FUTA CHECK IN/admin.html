<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Dashboard</title>
    <link rel="stylesheet" href="futacheckin.css">
    <style>
        @media print { .no-print { display: none !important; } }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <nav class="navbar no-print">
        <div class="logo">LECTURER DASHBOARD</div>
        <button onclick="window.print()">Download/Print PDF</button>
    </nav>

    <div class="app-container">
        <div class="admin-card">
            <h2>Select Course</h2>
            <select id="course-select" class="input-group">
                <option value="CSC101">CSC 101</option>
                <option value="MTH101">MTH 101</option>
                <option value="PHY101">PHY 101</option>
                <option value="GST101">GST 101</option>
            </select>
            
            <h2>Generate Class Code</h2>
            <button id="generate-btn" class="submit-button">Create Code for Selection</button>
            <h1 id="active-code" style="font-size: 3rem; color: #007bff;">---</h1>
        </div>

        <div class="admin-card">
            <h2>Live Attendance List</h2>
            <button onclick="fetchAttendance()" class="no-print">Refresh List</button>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Matric Number</th>
                        <th>Course</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="attendance-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCsh53VdFAGSchGozezZobbhXrpcYlXG4I",
            authDomain: "futa-students-attendance.firebaseapp.com",
            projectId: "futa-students-attendance",
            storageBucket: "futa-students-attendance.firebasestorage.app",
            messagingSenderId: "847903496338",
            appId: "1:847903496338:web:b5dbb709c0474a43c6ae4b"
        }));

        if (sessionStorage.getItem("userRole") !== "lecturer") window.location.href = "login.html";

        // GENERATE CODE WITH 2-MINUTE EXPIRATION TIMESTAMP
        document.getElementById('generate-btn').addEventListener('click', async () => {
            const rawCourse = document.getElementById('course-select').value;
            // Standardize ID: CSC 101 -> CSC101
            const cleanCourse = rawCourse.replace(/\s+/g, '').toUpperCase();
            
            const newCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Save code AND current timestamp
            await setDoc(doc(db, "active_sessions", cleanCourse), { 
                code: newCode,
                createdAt: Date.now() 
            });
            
            document.getElementById('active-code').innerText = newCode;
            alert(`Code generated for ${rawCourse}: ${newCode}. It will expire in 2 minutes.`);
        });

        // LOAD ATTENDANCE
        async function fetchAttendance() {
            const selectedCourse = document.getElementById('course-select').value;
            const q = query(collection(db, "checked_in_students"), where("course", "==", selectedCourse));
            const querySnapshot = await getDocs(q);
            
            const tbody = document.getElementById('attendance-body');
            tbody.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const s = doc.data();
                tbody.innerHTML += `<tr><td>${s.name}</td><td>${s.matric}</td><td>${s.course}</td><td>${s.timestamp}</td></tr>`;
            });
        }

        document.getElementById('course-select').addEventListener('change', fetchAttendance);
        setInterval(fetchAttendance, 10000);
    </script>
</body>
</html>
