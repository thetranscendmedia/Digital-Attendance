<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Portal</title>
    <link rel="stylesheet" href="futacheckin.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">STUDENT'S CHECK-IN PORTAL</div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="editprofile.html">Edit Profile</a></li>
            <li><a href="#" id="logout-btn">Logout</a></li>
        </ul>
    </nav>

    <div class="app-container">
        <header class="user-header">
            <div class="avatar-circle">FUTA</div>
            <div class="user-details">
                <h1>Welcome, <span id="display-name">...</span></h1>
                <p>Matric Number: <span id="display-matric">...</span></p>
            </div>
        </header>

        <main class="attendance-card">
            <div class="card-top">
                <h1>Class Check-in</h1>
                <p>Course: <span id="display-course">...</span></p>
            </div>

            <div class="card-body">
                <div class="input-group">
                    <label>Enter 6-Digit Code</label>
                    <input type="text" id="code-input" class="code-field" maxlength="6" placeholder="000000">
                </div>
                
                <p class="timer-display">Code expires in: <span id="countdown">02:00</span></p>
                
                <button class="submit-button" id="checkin-btn">Confirm Attendance</button>

                <div id="success-box" style="display:none; margin-top: 20px; color: green; font-weight: bold;">
                    <strong>✓ Attendance Recorded Successfully!</strong>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, getDoc, addDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCsh53VdFAGSchGozezZobbhXrpcYlXG4I",
            authDomain: "futa-students-attendance.firebaseapp.com",
            projectId: "futa-students-attendance",
            storageBucket: "futa-students-attendance.firebasestorage.app",
            messagingSenderId: "847903496338",
            appId: "1:847903496338:web:b5dbb709c0474a43c6ae4b"
        }));

        // 1. Load User Data
        const name = sessionStorage.getItem("studentName");
        const matric = sessionStorage.getItem("matricNumber");
        const rawCourse = sessionStorage.getItem("courseCode");
        const cleanCourse = rawCourse ? rawCourse.replace(/\s+/g, '').toUpperCase() : "";

        if (!name) {
            window.location.href = 'login.html';
        } else {
            document.getElementById("display-name").innerText = name;
            document.getElementById("display-matric").innerText = matric;
            document.getElementById("display-course").innerText = rawCourse;
        }

        // 2. Attendance Verification Logic
        document.getElementById('checkin-btn').addEventListener('click', async () => {
            const studentCode = document.getElementById('code-input').value;
            
            try {
                const codeSnap = await getDoc(doc(db, "active_sessions", cleanCourse));
                
                if (!codeSnap.exists()) {
                    alert(`No active session for ${rawCourse}. Please wait for the lecturer.`);
                    return;
                }
                
                const data = codeSnap.data();
                
                // EXPIRATION CHECK: 120,000ms = 2 minutes
                if ((Date.now() - data.createdAt) > 120000) {
                    alert("This session has expired! Please ask your lecturer to generate a new code.");
                    return;
                }

                if (studentCode === data.code) {
                    const q = query(collection(db, "checked_in_students"), 
                                    where("matric", "==", matric), 
                                    where("course", "==", rawCourse));
                    const check = await getDocs(q);

                    if (!check.empty) {
                        alert("You have already checked in for this course!");
                    } else {
                        await addDoc(collection(db, "checked_in_students"), {
                            name: name,
                            matric: matric,
                            course: rawCourse,
                            timestamp: new Date().toLocaleString()
                        });
                        document.getElementById('success-box').style.display = "block";
                    }
                } else {
                    alert(`Invalid Code for ${rawCourse}!`);
                }
            } catch (e) {
                console.error(e);
                alert("Server error. Please check your connection.");
            }
        });

        // 3. Logout
        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.clear();
            window.location.href = 'login.html';
        });

        // 4. Timer (Visual only)
        let time = 120;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            if (time > 0) {
                time--;
                let m = Math.floor(time / 60);
                let s = time % 60;
                countdownEl.innerHTML = `0${m}:${s < 10 ? '0'+s : s}`;
            } else {
                countdownEl.innerHTML = "EXPIRED";
                clearInterval(timer);
            }
        }, 1000);
    </script>
</body>
</html>
