        <main class="app-container">
            <div class="login-header">
                <h1>Edit Profile</h1>
                <p>Update your information for the university portal.</p>
            </div>
            
            <form id="edit-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="input-name" class="input-field" placeholder="Enter full name">
                </div>
                <div class="input-group">
                    <label>Matric Number</label>
                    <input type="text" id="input-matric" class="input-field" placeholder="e.g. FTS/25/0000">
                </div>
                <div class="input-group">
                    <label>Faculty</label>
                    <input type="text" id="input-faculty" class="input-field" placeholder="e.g. Science">
                </div>
                <div class="input-group">
                    <label>Department</label>
                    <input type="text" id="input-dept" class="input-field" placeholder="e.g. Computer Science">
                </div>
                
                <button type="button" id="save-btn" class="submit-button">Save Changes</button>
            </form>
        </main>
    </div>
