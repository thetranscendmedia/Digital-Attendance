    <div class="page-card">
        

        <div class="app-container">
            <header class="user-header">
                <div class="avatar-circle">FUTA</div>
                <div class="user-details">
                    <h1>Welcome, <span id="display-name">...</span></h1>
                    <p>Matric Number: <span id="display-matric">...</span></p>
                </div>
            </header>

            <main class="attendance-card">
                <div class="card-top">
                    <h1>Class Check-in</h1>
                    <p>Course: <span id="display-course">...</span></p>
                </div>

                <div class="card-body">
                    <div class="input-group">
                        <label>Enter 6-Digit Code</label>
                        <input type="text" id="code-input" class="code-field" maxlength="6" placeholder="000000">
                    </div>
                    
                    <p class="timer-display">Code expires in: <span id="countdown">02:00</span></p>
                    
                    <button class="submit-button" id="checkin-btn">Confirm Attendance</button>

                    <div id="success-box" style="display:none; margin-top: 20px; color: green; font-weight: bold;">
                        <strong>✓ Attendance Recorded Successfully!</strong>
                    </div>
                </div>
            </main>
        </div>
    </div>
