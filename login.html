<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Uni Attendance</title>
    <link rel="stylesheet" href="futacheckin.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">

    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="app-container">
        <main class="login-card">
            <img src="./IMAGES/futalogo.png" alt="FUTA Logo" class="logo images"/>
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Sign in with your details</p>
            </div>

            <form class="login-body">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name-field" placeholder="Enter Full Name" required>
                </div>
                <div class="input-group">
                    <label>Course Code</label>
                    <input type="text" id="course-field" placeholder="e.g. CSC101" required>
                </div>
                <div class="input-group">
                    <label>Matric Number</label>
                    <input type="text" id="matric-field" placeholder="e.g. SCI/2026/001" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="pass-field" placeholder="••••••••" required>
                </div>
                <button type="button" class="submit-button" id="loginBtn">Login</button>
            </form>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
    
        const firebaseConfig = {
            apiKey: "AIzaSyCsh53VdFAGSchGozezZobbhXrpcYlXG4I",
            authDomain: "futa-students-attendance.firebaseapp.com",
            projectId: "futa-students-attendance",
            storageBucket: "futa-students-attendance.firebasestorage.app",
            messagingSenderId: "847903496338",
            appId: "1:847903496338:web:b5dbb709c0474a43c6ae4b"
        };
    
        const db = getFirestore(initializeApp(firebaseConfig));
    
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const name = document.getElementById('name-field').value;
            const matric = document.getElementById('matric-field').value;
            const course = document.getElementById('course-field').value.replace(/\s+/g, '').toUpperCase();
            const password = document.getElementById('pass-field').value;
    
            // 1. ADMIN BYPASS
            if (name === "ADMINCSC101" && password === "198611") {
                sessionStorage.setItem("userRole", "lecturer");
                window.location.href = "admin.html";
                return;
            }
    
            if (!name || !matric || !password || !course) {
                alert("Please fill in all fields");
                return;
            }
    
            try {
                const studentsRef = collection(db, "students");
                const q = query(studentsRef, where("matricNumber", "==", matric));
                const querySnapshot = await getDocs(q);
    
                if (querySnapshot.empty) {
                    // REGISTER NEW STUDENT
                    const docRef = await addDoc(studentsRef, {
                        fullName: name,
                        matricNumber: matric,
                        courseCode: course,
                        password: password
                    });
                    
                    sessionStorage.setItem("studentName", name);
                    sessionStorage.setItem("matricNumber", matric);
                    sessionStorage.setItem("courseCode", course);
                    window.location.href = 'index.html';
                } else {
                    // LOGIN EXISTING STUDENT
                    const docSnap = querySnapshot.docs[0];
                    const studentData = docSnap.data();
    
                    if (studentData.password === password) {
                        // UPDATE course code if it has changed
                        if (studentData.courseCode !== course) {
                            await updateDoc(doc(db, "students", docSnap.id), { courseCode: course });
                        }
    
                        sessionStorage.setItem("studentName", studentData.fullName);
                        sessionStorage.setItem("matricNumber", studentData.matricNumber);
                        sessionStorage.setItem("courseCode", course);
    
                        alert("Login successful!");
                        window.location.href = 'index.html';
                    } else {
                        alert("Incorrect password!");
                    }
                }
            } catch (e) {
                console.error("Error: ", e);
                alert("Database Error: " + e.message);
            }
        });
    </script>
</body>
</html>
