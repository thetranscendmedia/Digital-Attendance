<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <link rel="stylesheet" href="futacheckin.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html">Check-in</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="login.html" id="auth-btn">Login</a>
        </div>
    </nav>

    <div class="app-container">
        <main class="profile-card">
            <div class="profile-pic-container">
                <div class="avatar-large"><IMG:srcset>JJ</IMG:srcset></div>
            </div>

            <div class="profile-details">
                <h2><span id="display-name">Guest</span></h2>
                
                <div class="info-group">
                    <label>Matric Number</label>
                    <p><span id="display-matric">N/A</span></p>
                </div>
                <div class="info-group">
                    <label>Faculty</label>
                    <p><span id="display-faculty">N/A</span></p>
                </div>
                <div class="info-group">
                    <label>Department</label>
                    <p><span id="display-dept">N/A</span></p>
                </div>
            </div>
            
            <script>
                window.onload = function() {
                    
                    document.getElementById('display-name').innerText = localStorage.getItem('userName') || 'Guest';
                    document.getElementById('display-matric').innerText = localStorage.getItem('userMatric') || 'N/A';
                    document.getElementById('display-faculty').innerText = localStorage.getItem('userFaculty') || 'N/A';
                    document.getElementById('display-dept').innerText = localStorage.getItem('userDept') || 'N/A';
                };

                // This runs on every page load to keep data synced
    const name = sessionStorage.getItem("studentName");
    const matric = sessionStorage.getItem("matricNumber");
    const course = sessionStorage.getItem("courseCode");

    if (name) {
       
        if(document.getElementById("display-name")) document.getElementById("display-name").innerText = name;
        if(document.getElementById("display-matric")) document.getElementById("display-matric").innerText = matric;
        if(document.getElementById("display-course")) document.getElementById("display-course").innerText = course;
    }
            </script>

            </footer>
            </html>
